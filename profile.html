  <div class="container" style="margin-top: 70px;">
    <h2>Welcome. Edit your profile here.</h2><br>
    <div class="wrapper">
      <dl class="dl-horizontal">
        <dt>Name : </dt>
        <dd>
          <div class="input-group">
          <span class="input-group-addon"><span class="glyphicon glyphicon-user"></span></span>
          <input class="form-control" name="name" placeholder="Enter your name">
          </div>
        </dd>
        <dt>Phone : </dt>
        <dd>
          <div class="input-group">
          <span class="input-group-addon"><span class="glyphicon glyphicon-phone"></span></span>
          <input class="form-control" name="phone" placeholder="Enter your phone">
          </div>
        </dd>
        <dt>Email : </dt>
        <dd>
          <div class="input-group">
          <span class="input-group-addon">@</span>
          <input class="form-control" name="email" placeholder="Enter your email">
          </div>
        </dd>
        <dt>Classes : </dt>
        <dd id="classes-count-profile">0</dd>
     </dl>
     <button class="btn btn-success update-profile">Save</button>
